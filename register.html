{% extends "base.html" %}

{% block content %}
<div class =register-page>
    <div class="register-card">
        <h2>Register</h2>

        <form method="POST" action="{{ url_for('register') }}" autocomplete="off">
            <div class="row">
                <div class="field">
                    <label>First Name</label>
                    <input type="text" name="first_name" placeholder="Daniel" required>
                </div>

                <div class="field">
                    <label>Last Name</label>
                    <input type="text" name="last_name" placeholder="Simon" required>
                </div>
            </div>

            <div class="field">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="danielsimon@example.com" autocomplete="off" required>
            </div>

            <div class="field">
                <label>Address</label>
                <input type="text" name="address" placeholder="123, King Street, Norwich UK">
            </div>

            <div class="row">
                <div class="field small">
                    <label>Code</label>
                    <!-- <input type="text" name="code" placeholder="+44"> -->
                    <select >
                        <option>+44</option>
                        <option>+234</option>
                        <option>+123</option>
                    </select>
                </div>

                <div class="field">
                    <label>Phone Number</label>
                    <input type="text" name="phone" placeholder="7054 569843">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" minlength="8" autocomplete="new-password" required>
                </div>

            </div>


            <button type="submit" class="register-btn">Register</button>
            <p class="login-link">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
            </p>  
        </form>
    </div>
</div>
{% endblock %}
